upstream api_server {
    server api_server:8080;
}

upstream web_server {
    server web_server:3000;
}

server {
    listen 80 default_server;
    server_name _;

    # Allow large file uploads (connectors, attachments, etc.)
    client_max_body_size 100M;

    # Reasonable timeouts for long-running LLM requests
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ----------------------------------------------------------------
    # Backend API
    # Strips the /api prefix before forwarding:
    #   /api/health  ->  http://api_server:8080/health
    # ----------------------------------------------------------------
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://api_server;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Connection        "";
    }

    # OpenAPI schema is served at the backend root
    location = /openapi.json {
        proxy_pass http://api_server/openapi.json;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------------
    # Frontend (Next.js) — catch-all
    # ----------------------------------------------------------------
    location / {
        proxy_pass http://web_server;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HMR support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
