name: onyx

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api_server
      - web_server
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    labels:
      - traefik.enable=true
      - traefik.http.routers.onyx.rule=Host(`chat.paloblanco.ai`)
      - traefik.http.routers.onyx.entrypoints=https
      - traefik.http.routers.onyx.tls=true
      - traefik.http.routers.onyx.tls.certresolver=letsencrypt
      - traefik.http.services.onyx.loadbalancer.server.port=80

  api_server:
    image: onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}
    command: >
      /bin/sh -c "alembic upgrade head &&
      echo 'Starting Onyx Api Server' &&
      uvicorn onyx.main:app --host 0.0.0.0 --port 8080"
    depends_on:
      relational_db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - DISABLE_VECTOR_DB=true
      - FILE_STORE_BACKEND=postgres
      - CACHE_BACKEND=postgres
      - AUTH_BACKEND=postgres
      - AUTH_TYPE=${AUTH_TYPE:-basic}
      - POSTGRES_HOST=relational_db
      - POSTGRES_USER=${POSTGRES_USER:-onyx}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-onyx}
      - GEN_AI_API_KEY=${GEN_AI_API_KEY:-}
      - GEN_AI_MODEL_PROVIDER=${GEN_AI_MODEL_PROVIDER:-openai}
      - GEN_AI_MODEL_VERSION=${GEN_AI_MODEL_VERSION:-gpt-4o}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-}
      - OPENID_CONFIG_URL=${OPENID_CONFIG_URL:-}
      - WEB_DOMAIN=https://chat.paloblanco.ai
      - CORS_ALLOWED_ORIGINS=https://chat.paloblanco.ai
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - host.docker.internal:host-gateway
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"
    volumes:
      - api_server_logs:/var/log/onyx
      - file-system:/app/file-system

  web_server:
    image: onyxdotapp/onyx-web-server:${IMAGE_TAG:-latest}
    depends_on:
      - api_server
    restart: unless-stopped
    environment:
      - INTERNAL_URL=http://api_server:8080
      - NEXT_PUBLIC_API_BASE_URL=https://chat.paloblanco.ai
      - WEB_DOMAIN=https://chat.paloblanco.ai
    env_file:
      - path: .env
        required: false
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"

  relational_db:
    image: postgres:15.2-alpine
    shm_size: 1g
    command: "-c 'max_connections=250'"
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-onyx}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-onyx}
    volumes:
      - db_volume:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-onyx} -d ${POSTGRES_DB:-onyx}
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 50m
        max-file: "6"

volumes:
  db_volume:
  file-system:
  api_server_logs:
